name: Deploy to IONOS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  IONOS_HOST: ${{ secrets.IONOS_SFTP_HOST }}
  IONOS_USER: ${{ secrets.IONOS_SFTP_USER }}
  IONOS_PASS: ${{ secrets.IONOS_SFTP_PASSWORD }}

jobs:
  frontend:
    name: Build & deploy frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Optimize images
        working-directory: frontend
        run: npm run optimize:images

      - name: Build (Vite + prerender)
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://easyacct.us

      - name: Upload frontend via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ env.IONOS_HOST }}
          username: ${{ env.IONOS_USER }}
          password: ${{ env.IONOS_PASS }}
          local_path: 'frontend/dist/*'
          remote_path: '/'
          sftp_only: true
          delete_remote_files: false

  backend:
    name: Build & deploy backend
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, mysql, openssl, tokenizer, xml, ctype, json, fileinfo, bcmath, curl
          coverage: none
          tools: composer:v2

      - name: Install Composer deps (prod)
        working-directory: backend
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction --no-progress

      - name: Stage server tree
        run: |
          set -euo pipefail
          mkdir -p stage/_laravel stage/api
          rsync -a \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='node_modules' \
            --exclude='database/database.sqlite' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='storage/framework/testing/*' \
            backend/ stage/_laravel/
          # Keep .gitignore-only directories alive on the server
          find stage/_laravel/storage -type d -empty -exec touch {}/.gitkeep \;
          cp -r deploy/api/. stage/api/

      - name: Upload _laravel via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ env.IONOS_HOST }}
          username: ${{ env.IONOS_USER }}
          password: ${{ env.IONOS_PASS }}
          local_path: 'stage/_laravel/*'
          remote_path: '/_laravel'
          sftp_only: true
          delete_remote_files: false

      - name: Upload api/ via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ env.IONOS_HOST }}
          username: ${{ env.IONOS_USER }}
          password: ${{ env.IONOS_PASS }}
          local_path: 'stage/api/*'
          remote_path: '/api'
          sftp_only: true
          delete_remote_files: false

      - name: Run migrations + cache warm
        run: |
          set -e
          curl --fail --silent --show-error \
            "https://easyacct.us/api/_admin/migrate?token=${{ secrets.ADMIN_API_TOKEN }}" \
            | tee migrate.out
